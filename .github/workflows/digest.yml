name: Daily Digest

on:
  schedule:
    - cron: '0 2 * * *'   # 2 AM UTC = ~7:30 AM IST, runs while you're asleep
  push:
    paths:
      - '**.c'
  workflow_dispatch:       # manual trigger for testing

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history for diff

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Get last digest run SHA
        id: last_sha
        run: |
          # Read last processed SHA from tutor state, fallback to HEAD~1
          if [ -f .github/tutor/.last_digest_sha ]; then
            echo "sha=$(cat .github/tutor/.last_digest_sha)" >> $GITHUB_OUTPUT
          else
            echo "sha=$(git rev-list --max-parents=0 HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Generate filtered diff
        id: diff
        run: |
          git diff ${{ steps.last_sha.outputs.sha }}..HEAD -- '*.c' \
            | python3 .github/scripts/diff-filter.py > /tmp/filtered.diff
          if [ $? -ne 0 ]; then
            echo "no_changes=true" >> $GITHUB_OUTPUT
          else
            echo "no_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Run digest agent
        if: steps.diff.outputs.no_changes != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'EOF'
          import json, os, sys

          with open('/tmp/filtered.diff') as f:
              diff = f.read()

          with open('.github/tutor/knowledge-base.md') as f:
              kb = f.read()

          with open('.github/tutor/queue.json') as f:
              queue = json.load(f)

          with open('.github/prompts/digest.md') as f:
              system_prompt = f.read()

          import urllib.request

          payload = {
              "model": "gpt-4o",
              "max_tokens": 4096,
              "messages": [
                  {
                      "role": "user",
                      "content": f"""Here is the current knowledge base:\n\n{kb}\n\n---\n\nHere is the current queue (existing questions):\n\n{json.dumps(queue, indent=2)}\n\n---\n\nHere is the filtered git diff since last digest:\n\n{diff}\n\n---\n\nRun the digest. Return only the JSON object as specified. No markdown, no preamble."""
                  }
              ]
          }

          req = urllib.request.Request(
              "https://models.inference.ai.azure.com/chat/completions",
              data=json.dumps(payload).encode(),
              headers={
                  "Content-Type": "application/json",
                  "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}"
              }
          )

          with urllib.request.urlopen(req) as resp:
              data = json.loads(resp.read())

          content = data["choices"][0]["message"]["content"]
          # strip possible markdown fences
          content = content.strip()
          if content.startswith("```"):
              content = content.split("\n", 1)[1].rsplit("```", 1)[0]

          result = json.loads(content)

          with open('/tmp/digest_result.json', 'w') as f:
              json.dump(result, f, indent=2)

          print("Digest agent completed.")
          print("Summary:", result.get("digest_summary", ""))
          EOF

      - name: Apply digest results
        if: steps.diff.outputs.no_changes != 'true'
        run: |
          python3 << 'EOF'
          import json
          from datetime import date

          with open('/tmp/digest_result.json') as f:
              result = json.load(f)

          # Add new questions to queue
          if result.get("new_questions"):
              new_q_json = json.dumps(result["new_questions"])
              import subprocess
              subprocess.run(
                  ["python3", ".github/scripts/srs.py", "add", new_q_json],
                  check=True
              )

          # Append digest summary and flags to knowledge base
          updates = result.get("knowledge_base_updates", {})
          flags = result.get("tutor_flags", [])
          summary = result.get("digest_summary", "")
          suggestions = result.get("project_suggestions", [])

          today = date.today().isoformat()

          with open('.github/tutor/knowledge-base.md', 'a') as f:
              f.write(f"\n\n---\n\n## Digest Update — {today}\n\n")
              f.write(f"**Summary**: {summary}\n\n")

              if updates.get("concepts_solid_add"):
                  f.write("**Concepts → Solid**: " + ", ".join(updates["concepts_solid_add"]) + "\n\n")
              if updates.get("concepts_shaky_add"):
                  f.write("**Concepts → Shaky**: " + ", ".join(updates["concepts_shaky_add"]) + "\n\n")
              if updates.get("gaps_new"):
                  f.write("**New Gaps**: " + ", ".join(updates["gaps_new"]) + "\n\n")
              if updates.get("gaps_resolved"):
                  f.write("**Gaps Resolved**: " + ", ".join(updates["gaps_resolved"]) + "\n\n")
              if updates.get("mental_models_add"):
                  for m in updates["mental_models_add"]:
                      f.write(f"**Mental Model**: {m}\n\n")
              if updates.get("project_notes"):
                  for n in updates["project_notes"]:
                      f.write(f"**Project Note**: {n}\n\n")
              if flags:
                  f.write("**Tutor Flags**: " + " | ".join(flags) + "\n\n")
              if suggestions:
                  f.write("**Project Suggestions**:\n")
                  for s in suggestions:
                      f.write(f"- {s}\n")

          print("Knowledge base updated.")
          EOF

      - name: Save current SHA
        run: |
          git rev-parse HEAD > .github/tutor/.last_digest_sha

      - name: Commit updates
        run: |
          git config user.name "tutor-bot"
          git config user.email "tutor-bot@noreply"
          git add .github/tutor/
          git diff --cached --quiet || git commit -m "digest: $(date -u +%Y-%m-%d)"
          git push
