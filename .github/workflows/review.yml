name: Review Session

on:
  workflow_dispatch:
    inputs:
      max_questions:
        description: 'Number of questions (1-5)'
        required: false
        default: '4'

  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  generate-session:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Get due questions
        id: due
        run: |
          python3 .github/scripts/srs.py due > /tmp/due_questions.json
          count=$(python3 -c "import json; print(len(json.load(open('/tmp/due_questions.json'))))")
          echo "count=$count" >> $GITHUB_OUTPUT

      - name: Generate session issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAX_Q: ${{ github.event.inputs.max_questions }}
        run: |
          python3 << 'EOF'
          import json, os, urllib.request
          from datetime import date

          with open('/tmp/due_questions.json') as f:
              due = json.load(f)

          max_q = int(os.environ.get('MAX_Q', 4))
          due = due[:max_q]

          with open('.github/tutor/knowledge-base.md') as f:
              kb = f.read()

          with open('.github/prompts/review.md') as f:
              system_prompt = f.read()

          today = date.today().isoformat()

          payload = {
              "model": "o3-mini",
              "max_tokens": 2048,
              "messages": [
                  {"role": "system", "content": system_prompt},
                  {
                      "role": "user",
                      "content": f"""mode: generate\n\nKnowledge base:\n{kb}\n\nDue questions:\n{json.dumps(due, indent=2)}\n\nDate: {today}\n\nGenerate the session issue body."""
                  }
              ]
          }

          req = urllib.request.Request(
              "https://models.inference.ai.azure.com/chat/completions",
              data=json.dumps(payload).encode(),
              headers={
                  "Content-Type": "application/json",
                  "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}"
              }
          )

          with urllib.request.urlopen(req) as resp:
              data = json.loads(resp.read())

          issue_body = data["choices"][0]["message"]["content"]

          # Store due question IDs so grader can match them
          q_ids = [q["id"] for q in due]

          # Create the GitHub issue
          issue_payload = {
              "title": f"Review Session — {today}",
              "body": issue_body + f"\n\n<!-- session_ids: {json.dumps(q_ids)} -->",
              "labels": ["review-session"]
          }

          repo = os.environ['GITHUB_REPOSITORY']
          token = os.environ['GITHUB_TOKEN']

          req2 = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/issues",
              data=json.dumps(issue_payload).encode(),
              headers={
                  "Content-Type": "application/json",
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json"
              }
          )

          with urllib.request.urlopen(req2) as resp:
              issue = json.loads(resp.read())

          print(f"Created issue #{issue['number']}: {issue['html_url']}")
          EOF

  grade-session:
    # Triggers when you comment on a review-session issue
    if: |
      github.event_name == 'issue_comment' &&
      contains(github.event.issue.labels.*.name, 'review-session') &&
      github.event.comment.user.login == github.repository_owner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Collect answers and grade
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          python3 << 'EOF'
          import json, os, re, urllib.request
          from datetime import date

          token = os.environ['GITHUB_TOKEN']
          repo = os.environ['GITHUB_REPOSITORY']
          issue_number = os.environ['ISSUE_NUMBER']
          issue_body = os.environ['ISSUE_BODY']
          answers = os.environ['COMMENT_BODY']

          # Extract session question IDs from issue body
          match = re.search(r'<!-- session_ids: (.+?) -->', issue_body)
          if not match:
              print("No session_ids found in issue. Skipping.")
              exit(0)

          q_ids = json.loads(match.group(1))

          # Load those questions from queue
          with open('.github/tutor/queue.json') as f:
              queue_data = json.load(f)

          q_map = {q["id"]: q for q in queue_data["queue"]}
          questions = [q_map[qid] for qid in q_ids if qid in q_map]

          with open('.github/prompts/review.md') as f:
              system_prompt = f.read()

          payload = {
              "model": "o3-mini",
              "max_tokens": 2048,
              "messages": [
                  {"role": "system", "content": system_prompt},
                  {
                      "role": "user",
                      "content": f"""mode: grade\n\nQuestions:\n{json.dumps(questions, indent=2)}\n\nLearner answers:\n{answers}\n\nReturn only the JSON grade object as specified."""
                  }
              ]
          }

          req = urllib.request.Request(
              "https://models.inference.ai.azure.com/chat/completions",
              data=json.dumps(payload).encode(),
              headers={
                  "Content-Type": "application/json",
                  "Authorization": f"Bearer {token}"
              }
          )

          with urllib.request.urlopen(req) as resp:
              data = json.loads(resp.read())

          content = data["choices"][0]["message"]["content"].strip()
          if content.startswith("```"):
              content = content.split("\n", 1)[1].rsplit("```", 1)[0]

          result = json.loads(content)

          # Update SRS queue with grades
          grades = [{"id": g["question_id"], "score": g["score"]} for g in result["grades"]]
          import subprocess
          subprocess.run(
              ["python3", ".github/scripts/srs.py", "update", json.dumps(grades)],
              check=True
          )

          # Build feedback comment
          today = date.today().isoformat()
          feedback_lines = [f"## Grades — {today}\n"]
          for g in result["grades"]:
              score = g["score"]
              bar = "█" * score + "░" * (5 - score)
              feedback_lines.append(f"**{g['question_id']}** [{bar}] {score}/5")
              feedback_lines.append(f"> {g['feedback']}\n")

          feedback_lines.append(f"\n**Session Summary**: {result['session_summary']}")

          if result.get("knowledge_base_flags"):
              feedback_lines.append("\n**New gaps flagged**: " + ", ".join(result["knowledge_base_flags"]))

          feedback_comment = "\n".join(feedback_lines)

          # Post feedback as issue comment
          comment_payload = {"body": feedback_comment}
          req2 = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/issues/{issue_number}/comments",
              data=json.dumps(comment_payload).encode(),
              headers={
                  "Content-Type": "application/json",
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json"
              }
          )
          with urllib.request.urlopen(req2) as resp:
              pass

          # Append to session log
          with open('.github/tutor/session-log.md', 'a') as f:
              f.write(f"\n\n---\n\n## Session — {today} (Issue #{issue_number})\n\n")
              f.write(feedback_comment)

          print("Grading complete.")
          EOF

      - name: Commit updated queue and log
        run: |
          git config user.name "tutor-bot"
          git config user.email "tutor-bot@noreply"
          git add .github/tutor/
          git diff --cached --quiet || git commit -m "review: session graded $(date -u +%Y-%m-%d)"
          git push
